<script>
  const DATA=JSON.parse(document.getElementById('data').textContent);
  const grid=document.getElementById('grid'),q=document.getElementById('q'),cont=document.getElementById('cont'),
        isoOnly=document.getElementById('isoOnly'),countEl=document.getElementById('count'),emptyEl=document.getElementById('empty'),
        toast=document.getElementById('toast'),b43=document.getElementById('b43'),b11=document.getElementById('b11');
  let mode='4x3';
  [...new Set(DATA.map(d=>d.continent).filter(Boolean))].sort().forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c;cont.append(o);});
  if(DATA.some(d=>!d.continent)){const o=document.createElement('option');o.value='__none__';o.textContent='Org / Region';cont.append(o);}
  const frag=document.createDocumentFragment();
  const cards=DATA.map(d=>{const code=d.code.toLowerCase();
    const el=document.createElement('div');el.className='card';
    el.dataset.code=d.code;el.dataset.name=d.name.toLowerCase();el.dataset.cont=d.continent||'';el.dataset.iso=d.iso?'1':'0';
    el.innerHTML='<img loading="lazy" data-c="'+code+'" src="4x3/'+code+'.svg" alt="'+d.name+'" onerror="this.style.opacity=.25">'+
      '<div class="code">'+d.code+'</div><div class="name">'+d.name+'</div>';
    el.addEventListener('click',()=>copy(d.code));frag.append(el);return el;});
  grid.append(frag);
  function apply(){const term=q.value.trim().toLowerCase(),c=cont.value,io=isoOnly.checked;let n=0;
    for(const el of cards){const ok=(!term||el.dataset.code.toLowerCase().includes(term)||el.dataset.name.includes(term))
      &&(!c||(c==='__none__'?el.dataset.cont==='':el.dataset.cont===c))&&(!io||el.dataset.iso==='1');
      el.hidden=!ok;if(ok)n++;}
    countEl.textContent=n+' shown';emptyEl.hidden=n>0;}
  function setMode(m){mode=m;grid.classList.toggle('sq',m==='1x1');
    b43.classList.toggle('on',m==='4x3');b11.classList.toggle('on',m==='1x1');
    for(const im of grid.querySelectorAll('img'))im.src=m+'/'+im.dataset.c+'.svg';}
  b43.onclick=()=>setMode('4x3');b11.onclick=()=>setMode('1x1');
  q.addEventListener('input',apply);cont.addEventListener('change',apply);isoOnly.addEventListener('change',apply);
  let t;function copy(code){navigator.clipboard&&navigator.clipboard.writeText(code).catch(()=>{});
    toast.textContent='Copied '+code;toast.classList.add('show');clearTimeout(t);t=setTimeout(()=>toast.classList.remove('show'),1100);}
  apply();
</script></body></html>
